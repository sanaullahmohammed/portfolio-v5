<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mohammed Sanaullah — Software Engineer</title>
    <script>
      // spa-github-pages: redirect deep links to index.html with the original
      // path encoded as a query string. App-side script in index.html restores it.
      (function () {
        var segmentCount = 1; // /portfolio-v5/ → 1 segment to preserve
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + segmentCount)
              .join("/") +
            "/?p=/" +
            l.pathname.slice(1).split("/").slice(segmentCount).join("/").replace(/&/g, "~and~") +
            (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
